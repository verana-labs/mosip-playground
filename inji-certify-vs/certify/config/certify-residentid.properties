# Resident-ID active profile for the Verana×MOSIP pilot.
# Overlays mosip/inji-certify's certify-default.properties to:
#  - run Inji Certify as its OWN authorization server (Pre-Authorized Code flow) — no eSignet
#  - issue via the bundled CSV DataProvider plugin (real Certify issuance, sample data source)
#  - sign ldp_vc with Ed25519 under the did:web issuer identity
# Mirrors the structural properties of certify-csvdp-farmer.properties, with our values.

# --- this deployment's public identity + db ---
mosip.certify.domain.url=https://inji-certify-vs.mosip.testnet.verana.network
mosip.certify.identifier=${mosip.certify.domain.url}
mosip.certify.database.hostname=postgres-certify
mosip.certify.database.port=5432

# --- no Spring Cloud Config server (default points at an unreachable localhost:8888) ---
spring.cloud.config.enabled=false

# --- add credentialOfferCache: the pre-auth flow needs it but it is absent from the default list ---
mosip.certify.cache.names=userinfo,vcissuance,certificatedatacache,credentialConfig,renderTemplate,jwks,preAuthCodeCache,asMetadataCache,credentialOfferCache

# --- PKCS12 keystore at an absolute path matching the k8s mount (default is relative to CWD) ---
mosip.kernel.keymanager.hsm.config-path=/home/mosip/CERTIFY_PKCS12/local.p12

# --- Phase 2: our eSignet is the authorization server (auth-code flow, for the inji-web wallet).
# Supersedes the phase-0 pre-auth self-AS. The issued VC, its did:web issuer and VTJSC
# binding are unchanged, so the Verana resolver Q1/Q2 still hold — only the issuance path
# moves from pre-auth to the auth-code flow the wallet uses. authorization.url drives the
# AS advertised in certify's OID4VCI well-known (confirmed against the live well-known). ---
# IMPORTANT: certify validates the access-token `iss` with Spring's JwtIssuerValidator
# (EXACT string match). Our eSignet's discovery.issuer-id = its domain url with NO
# /v1/esignet suffix (confirmed live: oauth-authorization-server `issuer` =
# https://esignet-vs.mosip.testnet.verana.network). So authn.issuer-uri MUST be the bare
# authorization.url — adding /v1/esignet here makes certify reject every token as
# invalid_token. (MOSIP's collab default appends /v1/esignet because their esignet-mock
# advertises that issuer; ours does not.) jwks still lives under /v1/esignet/oauth.
mosip.certify.authorization.url=https://esignet-vs.mosip.testnet.verana.network
mosip.certify.authn.issuer-uri=${mosip.certify.authorization.url}
mosip.certify.authn.jwk-set-uri=${mosip.certify.authorization.url}/v1/esignet/oauth/.well-known/jwks.json
mosip.certify.authn.allowed-audiences={ '${mosip.certify.domain.url}${server.servlet.path}/issuance/credential', '${mosip.certify.authorization.url}/v1/esignet/vci/credential' }
mosip.certify.oauth.issuer=${mosip.certify.authorization.url}/v1/esignet
mosip.certify.oauth.token-endpoint=${mosip.certify.authorization.url}/v1/esignet/oauth/v2/token
mosip.certify.oauth.jwks-uri=${mosip.certify.authorization.url}/v1/esignet/oauth/.well-known/jwks.json
mosip.certify.oauth.grant-types-supported=authorization_code,urn:ietf:params:oauth:grant-type:pre-authorized_code
mosip.certify.authorization.default-server=${mosip.certify.authorization.url}/v1/esignet

# --- mock integration beans (required to resolve, same as the farmer profile) ---
mosip.certify.integration.scan-base-package=io.mosip.certify.mock.integration
mosip.certify.integration.audit-plugin=LoggerAuditService
mosip.certify.integration.vci-plugin=MockVCIssuancePlugin
mosip.certify.mock.vciplugin.verification-method=${mosip.certify.authn.jwk-set-uri}
mosip.certify.mock.authenticator.get-identity-url=http://mock-identity-system:8082/v1/mock-identity-system/identity
mosip.certify.cache.security.algorithm-name=AES/ECB/PKCS5Padding
mosip.certify.cache.secure.individual-id=false
mosip.certify.cache.store.individual-id=true

# --- DataProvider mode with the bundled CSV plugin ---
mosip.certify.plugin-mode=DataProvider
mosip.certify.integration.data-provider-plugin=MockCSVDataProviderPlugin
mosip.certify.data-provider-plugin.did-url=did:web:inji-certify-vs.mosip.testnet.verana.network
mosip.certify.data-provider-plugin.id-field-prefix-uri=https://mosip.io/credential/
mosip.certify.data-provider-plugin.rendering-template-id=
mosip.certify.status-list.signature-crypto-suite=Ed25519Signature2020

# --- the resident registry the CSV plugin reads (id is the lookup key) ---
mosip.certify.mock.data-provider.csv.identifier-column=sub
mosip.certify.mock.data-provider.csv.data-columns=fullName,dateOfBirth,identifier
mosip.certify.mock.data-provider.csv-registry-uri=/home/mosip/config/resident_identity_data.csv

# --- issuer display required by credentialConfigurationServiceImpl (the missing one that crashed boot) ---
mosip.certify.credential-config.issuer.display={\
  {\
    'name': 'MOSIP Pilot Authority',\
    'locale': 'en'\
  }\
}
