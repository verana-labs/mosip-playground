# Edge for the inji-verify did:web host. Serves the STATIC did.json + linked-VP
# (verify-service's DidWebController generates a did.json with an empty service[],
# so the Verana ECS-SERVICE linked-VP must be served statically here for resolver Q1),
# and proxies everything else to the official verify-service.
server {
    listen 80;
    server_name _;

    # did:web:inji-verify.mosip.testnet.verana.network:v1:verify -> /v1/verify/did.json
    location = /v1/verify/did.json {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        alias /static/did.json;
    }

    # LinkedVerifiablePresentation serviceEndpoint (resolver Q1 fetches this)
    location = /vt/schemas-service-c-vp.json {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        alias /static/schemas-service-c-vp.json;
    }

    # Everything else (vp-request, vp-submission, actuator, ...) -> verify-service
    location / {
        proxy_pass http://verify-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
