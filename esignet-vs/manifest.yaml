# eSignet VS — standalone OIDC authorization server + mock-identity IDP + OIDC login UI.
# Lets the inji-web wallet run the OID4VCI authorization_code flow against inji-certify.
# Does NOT touch the certify deployment — pre-auth issuance is unaffected.
#   eSignet:  https://esignet-vs.mosip.testnet.verana.network/v1/esignet
#   OIDC UI:  https://esignet-ui-vs.mosip.testnet.verana.network
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: esignet-pg
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: esignet-keystore
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 64Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-esignet
  labels: { app: postgres-esignet }
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres-esignet }
  template:
    metadata:
      labels: { app: postgres-esignet }
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - { name: POSTGRES_USER, value: postgres }
            - { name: POSTGRES_PASSWORD, value: postgres }
            - { name: POSTGRES_DB, value: postgres }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports:
            - containerPort: 5432
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - { name: initdb, mountPath: /docker-entrypoint-initdb.d }
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        - name: initdb
          configMap: { name: esignet-initdb }
        - name: data
          persistentVolumeClaim: { claimName: esignet-pg }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-esignet
spec:
  selector: { app: postgres-esignet }
  ports:
    - { port: 5432, targetPort: 5432 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-esignet
  labels: { app: redis-esignet }
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis-esignet }
  template:
    metadata:
      labels: { app: redis-esignet }
    spec:
      containers:
        - name: redis
          image: redis:6.0
          ports:
            - containerPort: 6379
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: redis-esignet
spec:
  selector: { app: redis-esignet }
  ports:
    - { port: 6379, targetPort: 6379 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-identity-system
  labels: { app: mock-identity-system }
spec:
  replicas: 1
  selector:
    matchLabels: { app: mock-identity-system }
  template:
    metadata:
      labels: { app: mock-identity-system }
    spec:
      containers:
        - name: mock-identity-system
          image: mosipid/mock-identity-system:0.13.0
          ports:
            - containerPort: 8082
          env:
            - { name: container_user, value: mosip }
            - { name: active_profile_env, value: "default,local" }
            - { name: SPRING_DATASOURCE_URL, value: "jdbc:postgresql://postgres-esignet:5432/mosip_mockidentitysystem?currentSchema=mockidentitysystem" }
            - { name: SPRING_DATASOURCE_USERNAME, value: postgres }
            - { name: SPRING_DATASOURCE_PASSWORD, value: postgres }
            - { name: MOSIP_ESIGNET_HOST, value: "esignet:8088" }
            # PSUT = individualId so the eSignet token sub matches certify's CSV lookup key.
            - { name: MOSIP_MOCK_IDA_KYC_PSUT_FIELD, value: "individualId" }
            - { name: MOSIP_MOCKIDENTITYSYSTEM_ESIGNET_ISSUER_ID, value: "https://esignet-vs.mosip.testnet.verana.network/v1/esignet" }
          resources:
            requests: { cpu: 100m, memory: 512Mi }
            limits: { cpu: "1", memory: 1Gi }
          readinessProbe:
            httpGet: { path: /v1/mock-identity-system/actuator/health, port: 8082 }
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 20
---
apiVersion: v1
kind: Service
metadata:
  name: mock-identity-system
spec:
  selector: { app: mock-identity-system }
  ports:
    - { port: 8082, targetPort: 8082 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esignet
  labels: { app: esignet }
spec:
  replicas: 1
  selector:
    matchLabels: { app: esignet }
  template:
    metadata:
      labels: { app: esignet }
    spec:
      securityContext:
        fsGroup: 1001
      containers:
        - name: esignet
          image: mosipid/esignet-with-plugins:1.8.0
          ports:
            - containerPort: 8088
          env:
            - { name: container_user, value: mosip }
            # Use the same profiles as the upstream docker-compose so all bundled
            # application-default.properties and application-local.properties load
            # from the JAR.  The "residentid" profile was incorrect — no such bundled
            # file exists, and it caused SPRING_CONFIG_LOCATION to strip everything.
            - { name: active_profile_env, value: "default,local" }
            - { name: plugin_name_env, value: "esignet-mock-plugin.jar" }
            # Disable Spring Cloud Config — we have no config-server in this standalone deploy.
            - { name: SPRING_CLOUD_CONFIG_ENABLED, value: "false" }
            # scan-base-package is defined only in mosip-config/esignet-default.properties
            # (served by a config-server in production).  Without a config-server it must
            # be injected as an env var.  We include the mock integration package only.
            - { name: MOSIP_ESIGNET_INTEGRATION_SCAN_BASE_PACKAGE, value: "io.mosip.esignet.mock.integration" }
            # Mock plugin wiring
            - { name: MOSIP_ESIGNET_INTEGRATION_AUDIT_PLUGIN, value: "LoggerAuditService" }
            - { name: MOSIP_ESIGNET_INTEGRATION_KEY_BINDER, value: "MockKeyBindingWrapperService" }
            - { name: MOSIP_ESIGNET_MOCK_DOMAIN_URL, value: "http://mock-identity-system:8082" }
            # Domain URL — no trailing slash, no context path (Spring appends /v1/esignet).
            - { name: MOSIP_ESIGNET_DOMAIN_URL, value: "https://esignet-vs.mosip.testnet.verana.network" }
            # Database — override the application-local.properties localhost defaults.
            # mosip.esignet.database.* feeds the datasource URL assembly.
            # spring.datasource.username/password are set separately because
            # application-default.properties hardcodes username=esignetuser and
            # password=${db.dbuser.password} which would fail without a config-server.
            - { name: MOSIP_ESIGNET_DATABASE_HOSTNAME, value: "postgres-esignet" }
            - { name: MOSIP_ESIGNET_DATABASE_PORT, value: "5432" }
            - { name: MOSIP_ESIGNET_DATABASE_NAME, value: "mosip_esignet" }
            - { name: MOSIP_ESIGNET_DATABASE_USERNAME, value: "postgres" }
            - { name: MOSIP_ESIGNET_DATABASE_PASSWORD, value: "postgres" }
            - { name: SPRING_DATASOURCE_USERNAME, value: "postgres" }
            - { name: SPRING_DATASOURCE_PASSWORD, value: "postgres" }
            # Redis — override application-local.properties localhost defaults.
            - { name: SPRING_DATA_REDIS_HOST, value: redis-esignet }
            - { name: SPRING_DATA_REDIS_PORT, value: "6379" }
            - { name: SPRING_DATA_REDIS_PASSWORD, value: "" }
            # Kafka disabled.
            - { name: KAFKA_ENABLED, value: "false" }
            - { name: SPRING_AUTOCONFIGURE_EXCLUDE, value: "org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration" }
            # PKCS12 keystore (no SoftHSM).
            - { name: MOSIP_KERNEL_KEYMANAGER_HSM_KEYSTORE_TYPE, value: "PKCS12" }
            - { name: MOSIP_KERNEL_KEYMANAGER_HSM_CONFIG_PATH, value: "/home/mosip/ESIGNET_PKCS12/local.p12" }
            - { name: MOSIP_KERNEL_KEYMANAGER_HSM_KEYSTORE_PASS, value: "local" }
            # Captcha off for the pilot.
            - { name: MOSIP_ESIGNET_CAPTCHA_REQUIRED, value: "" }
            # Credential scope for the resident-id VC.
            - { name: MOSIP_ESIGNET_SUPPORTED_CREDENTIAL_SCOPES, value: "{'resident_id_vc_ldp'}" }
            - { name: MOSIP_ESIGNET_CREDENTIAL_SCOPE_RESOURCE_MAPPING, value: "{'resident_id_vc_ldp': 'https://esignet-vs.mosip.testnet.verana.network/v1/esignet/vci/credential'}" }
            # OIDC login UI base URL.
            - { name: MOSIP_ESIGNET_UI_BASE_URL, value: "https://esignet-ui-vs.mosip.testnet.verana.network" }
            # Security — disable Keycloak JWT validation (no Keycloak in standalone deploy).
            - { name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI, value: "" }
            - { name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI, value: "" }
            - { name: MOSIP_ESIGNET_SECURITY_AUTH_POST_URLS, value: "{}" }
            - { name: MOSIP_ESIGNET_SECURITY_AUTH_PUT_URLS, value: "{}" }
            - { name: MOSIP_ESIGNET_SECURITY_AUTH_GET_URLS, value: "{}" }
          resources:
            requests: { cpu: 250m, memory: 1Gi }
            limits: { cpu: "1500m", memory: 3Gi }
          volumeMounts:
            - { name: keystore, mountPath: /home/mosip/ESIGNET_PKCS12 }
          readinessProbe:
            httpGet: { path: /v1/esignet/actuator/health, port: 8088 }
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 40
      volumes:
        - name: keystore
          persistentVolumeClaim: { claimName: esignet-keystore }
---
apiVersion: v1
kind: Service
metadata:
  name: esignet
spec:
  selector: { app: esignet }
  ports:
    - { port: 8088, targetPort: 8088 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esignet-ui
  labels: { app: esignet-ui }
spec:
  replicas: 1
  selector:
    matchLabels: { app: esignet-ui }
  template:
    metadata:
      labels: { app: esignet-ui }
    spec:
      containers:
        - name: oidc-ui
          image: mosipid/oidc-ui:1.8.0
          ports:
            - containerPort: 3000
          env:
            - { name: container_user, value: mosip }
            # DEFAULT_WELLKNOWN is read at container start by configure_start.sh and
            # written into env-config.js via env.env.  Supply it explicitly so the UI
            # shows the correct well-known endpoint links for our deployment.
            # Value is URL-encoded JSON matching the upstream docker-compose default.
            - { name: DEFAULT_WELLKNOWN, value: "%5B%7B%22name%22%3A%22OpenID%20Configuration%22%2C%22value%22%3A%22%2F.well-known%2Fopenid-configuration%22%7D%2C%7B%22name%22%3A%22Jwks%20Json%22%2C%22value%22%3A%22%2F.well-known%2Fjwks.json%22%7D%2C%7B%22name%22%3A%22Authorization%20Server%22%2C%22value%22%3A%22%2F.well-known%2Foauth-authorization-server%22%7D%5D" }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 200m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 20
---
apiVersion: v1
kind: Service
metadata:
  name: esignet-ui
spec:
  selector: { app: esignet-ui }
  ports:
    - { port: 3000, targetPort: 3000 }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: esignet-vs
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [esignet-vs.mosip.testnet.verana.network]
      secretName: esignet-vs.mosip.testnet.verana.network-cert
  rules:
    - host: esignet-vs.mosip.testnet.verana.network
      http:
        paths:
          - path: /v1/esignet
            pathType: Prefix
            backend:
              service: { name: esignet, port: { number: 8088 } }
          - path: /
            pathType: Prefix
            backend:
              service: { name: esignet-ui, port: { number: 3000 } }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: esignet-ui-vs
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [esignet-ui-vs.mosip.testnet.verana.network]
      secretName: esignet-ui-vs.mosip.testnet.verana.network-cert
  rules:
    - host: esignet-ui-vs.mosip.testnet.verana.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: esignet-ui, port: { number: 3000 } }
