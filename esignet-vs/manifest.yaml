# eSignet VS — standalone OIDC authorization server + mock-identity IDP + OIDC login UI.
# Lets the inji-web wallet run the OID4VCI authorization_code flow against inji-certify.
# Does NOT touch the certify deployment — pre-auth issuance is unaffected.
#   eSignet:  https://esignet-vs.mosip.testnet.verana.network/v1/esignet
#   OIDC UI:  https://esignet-ui-vs.mosip.testnet.verana.network
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: esignet-pg
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: esignet-keystore
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 64Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-esignet
  labels: { app: postgres-esignet }
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres-esignet }
  template:
    metadata:
      labels: { app: postgres-esignet }
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - { name: POSTGRES_USER, value: postgres }
            - { name: POSTGRES_PASSWORD, value: postgres }
            - { name: POSTGRES_DB, value: postgres }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports:
            - containerPort: 5432
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - { name: initdb, mountPath: /docker-entrypoint-initdb.d }
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        - name: initdb
          configMap: { name: esignet-initdb }
        - name: data
          persistentVolumeClaim: { claimName: esignet-pg }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-esignet
spec:
  selector: { app: postgres-esignet }
  ports:
    - { port: 5432, targetPort: 5432 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-esignet
  labels: { app: redis-esignet }
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis-esignet }
  template:
    metadata:
      labels: { app: redis-esignet }
    spec:
      containers:
        - name: redis
          image: redis:6.0
          ports:
            - containerPort: 6379
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: redis-esignet
spec:
  selector: { app: redis-esignet }
  ports:
    - { port: 6379, targetPort: 6379 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-identity-system
  labels: { app: mock-identity-system }
spec:
  replicas: 1
  selector:
    matchLabels: { app: mock-identity-system }
  template:
    metadata:
      labels: { app: mock-identity-system }
    spec:
      containers:
        - name: mock-identity-system
          image: mosipid/mock-identity-system:0.13.0
          ports:
            - containerPort: 8082
          env:
            - { name: container_user, value: mosip }
            - { name: active_profile_env, value: "default,local" }
            - { name: SPRING_DATASOURCE_URL, value: "jdbc:postgresql://postgres-esignet:5432/mosip_mockidentitysystem?currentSchema=mockidentitysystem" }
            - { name: SPRING_DATASOURCE_USERNAME, value: postgres }
            - { name: SPRING_DATASOURCE_PASSWORD, value: postgres }
            - { name: MOSIP_ESIGNET_HOST, value: "esignet:8088" }
            # PSUT = individualId so the eSignet token sub matches certify's CSV lookup key.
            - { name: MOSIP_MOCK_IDA_KYC_PSUT_FIELD, value: "individualId" }
            - { name: MOSIP_MOCKIDENTITYSYSTEM_ESIGNET_ISSUER_ID, value: "https://esignet-vs.mosip.testnet.verana.network/v1/esignet" }
          resources:
            requests: { cpu: 100m, memory: 512Mi }
            limits: { cpu: "1", memory: 1Gi }
          readinessProbe:
            httpGet: { path: /v1/mock-identity-system/actuator/health, port: 8082 }
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 20
---
apiVersion: v1
kind: Service
metadata:
  name: mock-identity-system
spec:
  selector: { app: mock-identity-system }
  ports:
    - { port: 8082, targetPort: 8082 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esignet
  labels: { app: esignet }
spec:
  replicas: 1
  selector:
    matchLabels: { app: esignet }
  template:
    metadata:
      labels: { app: esignet }
    spec:
      securityContext:
        fsGroup: 1001
      containers:
        - name: esignet
          image: mosipid/esignet-with-plugins:1.8.0
          ports:
            - containerPort: 8088
          env:
            - { name: container_user, value: mosip }
            - { name: active_profile_env, value: "default,residentid" }
            - { name: plugin_name_env, value: "esignet-mock-plugin.jar" }
            - { name: MOSIP_ESIGNET_MOCK_DOMAIN_URL, value: "http://mock-identity-system:8082" }
            - { name: MOSIP_ESIGNET_INTEGRATION_KEY_BINDER, value: "MockKeyBindingWrapperService" }
            - { name: SPRING_CACHE_TYPE, value: redis }
            - { name: SPRING_DATA_REDIS_HOST, value: redis-esignet }
            - { name: SPRING_REDIS_PASSWORD, value: "" }
            - { name: KAFKA_ENABLED, value: "false" }
            - { name: SPRING_AUTOCONFIGURE_EXCLUDE, value: "org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration" }
            - { name: SPRING_CONFIG_LOCATION, value: /home/mosip/config/ }
            - { name: SPRING_CONFIG_NAME, value: esignet }
          resources:
            requests: { cpu: 250m, memory: 1Gi }
            limits: { cpu: "1500m", memory: 3Gi }
          volumeMounts:
            - { name: config, mountPath: /home/mosip/config }
            - { name: keystore, mountPath: /home/mosip/ESIGNET_PKCS12 }
          readinessProbe:
            httpGet: { path: /v1/esignet/actuator/health, port: 8088 }
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 40
      volumes:
        - name: config
          configMap: { name: esignet-config }
        - name: keystore
          persistentVolumeClaim: { claimName: esignet-keystore }
---
apiVersion: v1
kind: Service
metadata:
  name: esignet
spec:
  selector: { app: esignet }
  ports:
    - { port: 8088, targetPort: 8088 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esignet-ui
  labels: { app: esignet-ui }
spec:
  replicas: 1
  selector:
    matchLabels: { app: esignet-ui }
  template:
    metadata:
      labels: { app: esignet-ui }
    spec:
      containers:
        - name: oidc-ui
          image: mosipid/oidc-ui:1.8.0
          ports:
            - containerPort: 3000
          env:
            - { name: container_user, value: mosip }
            - { name: ESIGNET_API_URL, value: "https://esignet-vs.mosip.testnet.verana.network" }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 200m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 20
---
apiVersion: v1
kind: Service
metadata:
  name: esignet-ui
spec:
  selector: { app: esignet-ui }
  ports:
    - { port: 3000, targetPort: 3000 }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: esignet-vs
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [esignet-vs.mosip.testnet.verana.network]
      secretName: esignet-vs.mosip.testnet.verana.network-cert
  rules:
    - host: esignet-vs.mosip.testnet.verana.network
      http:
        paths:
          - path: /v1/esignet
            pathType: Prefix
            backend:
              service: { name: esignet, port: { number: 8088 } }
          - path: /
            pathType: Prefix
            backend:
              service: { name: esignet-ui, port: { number: 3000 } }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: esignet-ui-vs
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [esignet-ui-vs.mosip.testnet.verana.network]
      secretName: esignet-ui-vs.mosip.testnet.verana.network-cert
  rules:
    - host: esignet-ui-vs.mosip.testnet.verana.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: esignet-ui, port: { number: 3000 } }
