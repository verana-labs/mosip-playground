# eSignet authorization server — pilot override properties.
#
# THIS FILE IS NOT MOUNTED OR LOADED in the current standalone deploy.
# All overrides are injected as env vars in manifest.yaml, which layers on top of
# the bundled application-default.properties + application-local.properties inside
# the mosipid/esignet-with-plugins:1.8.0 JAR.
#
# Keeping this file as a reference and as a ready-to-use SPRING_CONFIG_ADDITIONAL_LOCATION
# target if a future iteration needs to move away from pure env-var overrides.
#
# To re-activate: add to the esignet container in manifest.yaml:
#   - { name: SPRING_CONFIG_ADDITIONAL_LOCATION, value: "file:/home/mosip/config/" }
# and mount this ConfigMap at /home/mosip/config/ with filename application-residentid.properties,
# then set active_profile_env=default,local,residentid.

spring.cloud.config.enabled=false

mosip.esignet.domain.url=https://esignet-vs.mosip.testnet.verana.network
mosip.esignet.mock.domain.url=http://mock-identity-system:8082

kafka.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

spring.cache.type=redis
spring.data.redis.host=redis-esignet
spring.data.redis.port=6379
spring.data.redis.password=

mosip.esignet.database.hostname=postgres-esignet
mosip.esignet.database.port=5432
mosip.esignet.database.name=mosip_esignet
mosip.esignet.database.username=postgres
mosip.esignet.database.password=postgres

mosip.kernel.keymanager.hsm.keystore-type=PKCS12
mosip.kernel.keymanager.hsm.config-path=/home/mosip/ESIGNET_PKCS12/local.p12
mosip.kernel.keymanager.hsm.keystore-pass=local

mosip.esignet.integration.scan-base-package=io.mosip.esignet.mock.integration
mosip.esignet.integration.audit-plugin=LoggerAuditService
mosip.esignet.integration.key-binder=MockKeyBindingWrapperService

mosip.esignet.captcha.required=

mosip.esignet.supported.credential.scopes={'resident_id_vc_ldp'}
mosip.esignet.credential.scope-resource-mapping={\
  'resident_id_vc_ldp': 'https://esignet-vs.mosip.testnet.verana.network/v1/esignet/vci/credential'\
}

mosip.esignet.ui.base.url=https://esignet-ui-vs.mosip.testnet.verana.network

spring.security.oauth2.resourceserver.jwt.issuer-uri=
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=
mosip.esignet.security.auth.post-urls={}
mosip.esignet.security.auth.put-urls={}
mosip.esignet.security.auth.get-urls={}
