# inji-web-vs — hosts the MOSIP Inji Web browser wallet + our verana-vp-gate add-on and its mimoto
# backend on k8s, so the Phase-2 holder-protection gate is publicly usable (not just local).
# Certify (inji-certify-vs) and eSignet (esignet-vs) are already hosted; this deploy adds:
#   inji-web (SPA + gate)  ->  mimoto (:8099)  ->  hosted certify + eSignet
#   mimoto  ->  postgres-mimoto (own DB)  +  wallet-config (serves issuers-config over HTTP)
#   mimoto  ->  datashare-service (:8097, PDF export #10)   [added in a follow-up manifest piece]
# Single public host inji-web.mosip.testnet.verana.network; inji-web's nginx proxies /v1/mimoto/
# to mimoto — which also carries the Google OAuth callback, since that lives under mimoto's
# /v1/mimoto context path. ConfigMaps (config, db init, nginx) + secrets (oidc keystore, google
# client) are created by workflow 12 from inji-web-vs/{config,db,nginx}/ and GH secrets, exactly
# like the esignet deploy.
---
# mimoto's own DB (inji_mimoto / schema mimoto), init from mimoto_init.sql. Ephemeral on purpose:
# the keymanager master key sits in the mounted oidckeystore.p12 while its alias rows live here, so
# a fresh DB each deploy keeps them in sync (same lifecycle reasoning as esignet's postgres).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-mimoto
  labels: { app: postgres-mimoto }
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres-mimoto } }
  template:
    metadata: { labels: { app: postgres-mimoto } }
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - { name: POSTGRES_USER, value: postgres }
            - { name: POSTGRES_PASSWORD, value: postgres }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports: [ { containerPort: 5432 } ]
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - { name: initdb, mountPath: /docker-entrypoint-initdb.d }
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        - name: initdb
          configMap: { name: mimoto-initdb }
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata: { name: postgres-mimoto }
spec:
  selector: { app: postgres-mimoto }
  ports: [ { port: 5432, targetPort: 5432 } ]
---
# wallet-config: tiny nginx serving the mimoto config files over HTTP at /config/server. mimoto's
# bootstrap points config.server.file.storage.uri here to fetch mimoto-issuers-config.json etc.
# (the certify-nginx role from the local compose, minus the certify proxy — certify is hosted).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-config
  labels: { app: wallet-config }
spec:
  replicas: 1
  selector: { matchLabels: { app: wallet-config } }
  template:
    metadata: { labels: { app: wallet-config } }
    spec:
      containers:
        - name: nginx
          image: nginx:stable
          ports: [ { containerPort: 80 } ]
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits: { cpu: 100m, memory: 128Mi }
          volumeMounts:
            - { name: conf, mountPath: /etc/nginx/conf.d/default.conf, subPath: wallet-config.conf }
            - { name: files, mountPath: /config/server }
      volumes:
        - name: conf
          configMap: { name: wallet-config-nginx }
        - name: files
          configMap: { name: wallet-config-files }
---
apiVersion: v1
kind: Service
metadata: { name: wallet-config }
spec:
  selector: { app: wallet-config }
  ports: [ { port: 80, targetPort: 80 } ]
---
# mimoto: the wallet backend. Reaches hosted certify + eSignet (via the mounted issuers-config),
# postgres-mimoto, wallet-config, and datashare-service. The Google client + oidc keystore come
# from secrets. server.forward-headers-strategy=framework (set in mimoto-default.properties) makes
# the OAuth {baseUrl} resolve to the public https host behind the inji-web nginx.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimoto
  labels: { app: mimoto }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: mimoto } }
  template:
    metadata: { labels: { app: mimoto } }
    spec:
      # mimoto runs as root (matches the official compose `user: root`) so the keymanager can
      # write its master key into the keystore copy below.
      securityContext:
        runAsUser: 0
      initContainers:
        # The keymanager generates its master key INTO oidckeystore.p12 at boot, so the file must
        # be writable. A Secret mount is read-only, so copy it into a writable emptyDir first; the
        # OIDC client key (the eSignet client assertion) is a separate alias and is preserved.
        # A fresh master key each deploy matches the ephemeral postgres-mimoto.
        - name: copy-keystore
          image: busybox:1.36
          command: ["sh", "-c", "cp /secret/oidckeystore.p12 /certs/oidckeystore.p12"]
          volumeMounts:
            - { name: keystore-secret, mountPath: /secret, readOnly: true }
            - { name: certs, mountPath: /certs }
      containers:
        - name: mimoto
          image: injistack/mimoto:0.21.0
          ports: [ { containerPort: 8099 } ]
          env:
            - { name: container_user, value: mosip }
            - { name: active_profile_env, value: default }
            - { name: SPRING_CONFIG_NAME, value: mimoto }
            - { name: SPRING_CONFIG_LOCATION, value: /home/mosip/ }
            - { name: SPRING_CLOUD_BOOTSTRAP_LOCATION, value: /home/mosip/mimoto-bootstrap.properties }
            - { name: oidc_p12_password, value: xy4gh6swa2i }
            - { name: WALLET_BINDING_PARTNER_API_KEY, value: dummywalletbindingpartnerapikey }
            - { name: SPRING_DATASOURCE_URL, value: "jdbc:postgresql://postgres-mimoto:5432/inji_mimoto" }
            - { name: POSTGRES_USER, value: postgres }
            - { name: POSTGRES_PASSWORD, value: postgres }
            - name: GOOGLE_OAUTH_CLIENT_ID
              valueFrom: { secretKeyRef: { name: wallet-google-oauth, key: client-id } }
            - name: GOOGLE_OAUTH_CLIENT_SECRET
              valueFrom: { secretKeyRef: { name: wallet-google-oauth, key: client-secret } }
          resources:
            requests: { cpu: 250m, memory: 1Gi }
            limits: { cpu: "1500m", memory: 3Gi }
          # Health is unreliable on this minimal stack (no redis); the issuers endpoint returning
          # 200 is the real readiness signal (it also proves the issuers-config loaded).
          readinessProbe:
            httpGet: { path: /v1/mimoto/issuers, port: 8099 }
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 40
          volumeMounts:
            - { name: config, mountPath: /home/mosip/mimoto-default.properties, subPath: mimoto-default.properties }
            - { name: config, mountPath: /home/mosip/mimoto-bootstrap.properties, subPath: mimoto-bootstrap.properties }
            - { name: config, mountPath: /home/mosip/mimoto-issuers-config.json, subPath: mimoto-issuers-config.json }
            - { name: config, mountPath: /home/mosip/mimoto-trusted-verifiers.json, subPath: mimoto-trusted-verifiers.json }
            - { name: certs, mountPath: /home/mosip/certs }
      volumes:
        - name: config
          configMap: { name: wallet-mimoto-config }
        - name: keystore-secret
          secret: { secretName: wallet-oidc-keystore }
        - name: certs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata: { name: mimoto }
spec:
  selector: { app: mimoto }
  ports: [ { port: 8099, targetPort: 8099 } ]
---
# inji-web: the official wallet SPA + our verana-vp-gate (image built by workflow 12 from
# inji-web-vs/Dockerfile). Its nginx serves the SPA and proxies /v1/mimoto/ (API + the Google OAuth
# callback under mimoto's context path) to mimoto. MIMOTO_URL is the public same-origin base.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inji-web
  labels: { app: inji-web }
spec:
  replicas: 1
  selector: { matchLabels: { app: inji-web } }
  template:
    metadata: { labels: { app: inji-web } }
    spec:
      containers:
        - name: inji-web
          image: veranalabs/inji-web:mosip
          imagePullPolicy: Always
          ports: [ { containerPort: 3004 } ]
          env:
            - { name: DEFAULT_LANG, value: en }
            - { name: MIMOTO_URL, value: "https://inji-web.mosip.testnet.verana.network/v1/mimoto" }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 300m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /, port: 3004 }
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 20
          volumeMounts:
            - { name: nginx, mountPath: /etc/nginx/conf.d/default.conf, subPath: inji-web.conf }
      volumes:
        - name: nginx
          configMap: { name: inji-web-nginx }
---
apiVersion: v1
kind: Service
metadata: { name: inji-web }
spec:
  selector: { app: inji-web }
  ports: [ { port: 3004, targetPort: 3004 } ]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: inji-web-vs
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [inji-web.mosip.testnet.verana.network]
      secretName: inji-web.mosip.testnet.verana.network-cert
  rules:
    - host: inji-web.mosip.testnet.verana.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: inji-web, port: { number: 3004 } }
---
# minio-service: object store backing datashare-service (standalone mode). Ephemeral demo store
# (no PVC) — only holds short-lived shared blobs (30-min TTL). datashare reaches it at minio-service:9000.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  labels: { app: minio }
spec:
  replicas: 1
  selector: { matchLabels: { app: minio } }
  template:
    metadata: { labels: { app: minio } }
    spec:
      containers:
        - name: minio
          image: mosipint/minio:2022.2.7-debian-10-r0
          env:
            - { name: MINIO_ROOT_USER, value: minioadmin }
            - { name: MINIO_ROOT_PASSWORD, value: minioadmin }
          ports: [ { containerPort: 9000 } ]
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata: { name: minio-service }
spec:
  selector: { app: minio }
  ports: [ { port: 9000, targetPort: 9000 } ]
---
# datashare-service: stores the credential + returns a short-lived share URL for mimoto's PDF export
# (#10). Standalone mode (static policy, encryptionType NONE, signature disabled) needs only minio —
# no keymanager/pms/keycloak. mimoto already calls http://datashare-service:8097 (set in its config).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: datashare
  labels: { app: datashare }
spec:
  replicas: 1
  selector: { matchLabels: { app: datashare } }
  template:
    metadata: { labels: { app: datashare } }
    spec:
      containers:
        - name: datashare
          image: mosipid/data-share-service:1.3.0-beta.2
          ports: [ { containerPort: 8097 } ]
          env:
            - { name: active_profile_env, value: "inji-default,standalone" }
            - { name: SPRING_CONFIG_NAME, value: data-share }
            - { name: SPRING_CONFIG_LOCATION, value: /home/mosip/ }
            - { name: DATASHARE_DOMAIN, value: "datashare-service:8097" }
          resources:
            requests: { cpu: 100m, memory: 512Mi }
            limits: { cpu: "1", memory: 1536Mi }
          readinessProbe:
            tcpSocket: { port: 8097 }
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 30
          volumeMounts:
            - { name: config, mountPath: /home/mosip/data-share-inji-default.properties, subPath: data-share-inji-default.properties }
            - { name: config, mountPath: /home/mosip/data-share-standalone.properties, subPath: data-share-standalone.properties }
      volumes:
        - name: config
          configMap: { name: wallet-datashare-config }
---
apiVersion: v1
kind: Service
metadata: { name: datashare-service }
spec:
  selector: { app: datashare }
  ports: [ { port: 8097, targetPort: 8097 } ]
