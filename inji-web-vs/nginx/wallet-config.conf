# Static config server for mimoto: serves the wallet config files over HTTP at /config/server.
# mimoto's bootstrap (config.server.file.storage.uri=http://wallet-config/) fetches
# mimoto-issuers-config.json, mimoto-trusted-verifiers.json, credential-template.html and
# vp_request_config.json from here. This is the certify-nginx role from the local compose,
# without the certify proxy (certify is hosted separately).
server {
    listen 80;
    sendfile off;

    location / {
        root /config/server;
        autoindex on;
    }
}
