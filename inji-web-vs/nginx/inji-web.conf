# inji-web SPA + same-origin mimoto proxy. Mounted over the base image's default.conf.
# /v1/mimoto/ carries the wallet API AND the Google OAuth dance (authorization + callback live
# under mimoto's /v1/mimoto context path). We force X-Forwarded-Proto: https and pass the public
# Host so mimoto's OAuth {baseUrl} resolves to https://inji-web.mosip.testnet.verana.network/v1/mimoto
# (mimoto must run with server.forward-headers-strategy=framework — set in mimoto-default.properties).
server {
    listen 3004;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.json$ {
        root /home/mosip;
        autoindex on;
    }

    location ~* /.*-template\.html$ {
        root /home/mosip;
        try_files $uri =404;
    }

    location /v1/mimoto/ {
        proxy_pass http://mimoto:8099/v1/mimoto/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Cache-Control' always;
        if ($request_method = 'OPTIONS') { return 204; }
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}
