name: 11_ Deploy eSignet VS (auth server for auth-code OID4VCI)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'esignet-vs/**'
      - '.github/workflows/11_deploy-esignet-vs.yml'

jobs:
  deploy-esignet-vs:
    name: Deploy eSignet + mock-identity-system + OIDC UI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.OVH_KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          printf '%s' "$KUBECONFIG_DATA" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create ConfigMaps (DB init + oidc-ui nginx)
        env:
          NS_SECRET: ${{ secrets.K8S_NAMESPACE }}
        run: |
          NS="${NS_SECRET:-mosip}"
          # No app-config ConfigMap: the esignet image is self-contained (bundles its
          # config). Only postgres init + the oidc-ui nginx.conf are mounted.
          kubectl create configmap esignet-initdb -n "$NS" \
            --from-file=esignet_init.sql=esignet-vs/db/esignet_init.sql \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create configmap esignet-oidc-nginx -n "$NS" \
            --from-file=nginx.conf=esignet-vs/oidc-ui/nginx.conf \
            --dry-run=client -o yaml | kubectl apply -f -

      # The keymanager stores its master key in an in-container PKCS12 keystore while the
      # key ALIAS lives in postgres. Replacing only the esignet pod (e.g. an env-only change)
      # leaves the old alias in the surviving DB -> KER-KMA-004 "No such alias" crashloop.
      # Recreating the whole stack keeps DB + keystores in sync (MOSIP's compose is
      # all-ephemeral for the same reason). Identities + the OIDC client are reloaded below.
      - name: Reset eSignet stack (keystore<->DB lifecycle)
        env:
          NS_SECRET: ${{ secrets.K8S_NAMESPACE }}
        run: |
          NS="${NS_SECRET:-mosip}"
          kubectl delete deployment esignet mock-identity-system postgres-esignet redis-esignet -n "$NS" --ignore-not-found
          kubectl wait --for=delete pod -l 'app in (esignet,mock-identity-system,postgres-esignet,redis-esignet)' -n "$NS" --timeout=180s || true

      - name: Deploy
        env:
          NS_SECRET: ${{ secrets.K8S_NAMESPACE }}
        run: |
          NS="${NS_SECRET:-mosip}"
          kubectl apply -n "$NS" -f esignet-vs/manifest.yaml
          kubectl rollout status deployment/postgres-esignet      -n "$NS" --timeout=180s
          kubectl rollout status deployment/redis-esignet          -n "$NS" --timeout=120s
          kubectl rollout status deployment/mock-identity-system   -n "$NS" --timeout=300s
          kubectl rollout status deployment/esignet                -n "$NS" --timeout=480s
          kubectl rollout status deployment/esignet-ui             -n "$NS" --timeout=180s
          echo "eSignet: https://esignet-vs.mosip.testnet.verana.network/v1/esignet"
          echo "OIDC UI: https://esignet-ui-vs.mosip.testnet.verana.network"

      # Identities live in esignet-vs/identities/*.json and must satisfy the image's
      # mock-identity-schema.json: individualId is NUMERIC ONLY (^[0-9]{5,19}$) and
      # givenName/familyName/gender/locality/region/country/postalCode/encodedPhoto/
      # preferredLang are all required. The step FAILS on a rejected identity — an
      # earlier '|| true' version silently loaded nothing.
      - name: Load mock identities
        env:
          NS_SECRET: ${{ secrets.K8S_NAMESPACE }}
        run: |
          NS="${NS_SECRET:-mosip}"
          POD=$(kubectl get pods -n "$NS" -l app=mock-identity-system -o jsonpath='{.items[0].metadata.name}')
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          for f in esignet-vs/identities/*.json; do
            BODY=$(jq -n --arg t "$NOW" --slurpfile r "$f" '{requestTime:$t, request:$r[0]}')
            RESP=$(echo "$BODY" | kubectl exec -i "$POD" -n "$NS" -- curl -s -X POST http://localhost:8082/v1/mock-identity-system/identity \
              -H 'Content-Type: application/json' -d @-)
            echo "$f -> $RESP"
            echo "$RESP" | jq -e '(.errors // []) | length == 0' >/dev/null
          done

      # The stack reset wipes registered OIDC clients with the DB — re-register EVERY
      # client (playground + wallet-demo) each deploy, else only the wallet survives and
      # the playground's mosip-playground client 404s with invalid_client_id. client-mgmt
      # is csrf-exempt and unprotected under the bundled local profile (same as upstream
      # compose); the payloads hold only PUBLIC keys.
      - name: Register OIDC clients (playground + wallet-demo)
        run: bash esignet-vs/scripts/register-clients.sh

      # Regression guard for the VC scope: a pure credential scope must validate for BOTH
      # clients the demo uses (wallet-demo = inji wallets, mosip-playground = showcase).
      # /authorization/** requires CSRF; Spring Security 6 XOR tokens — the header must
      # carry the token from the /csrf/token response BODY, not the raw cookie value.
      - name: Smoke test (clients + resident_id_vc_ldp accepted)
        run: |
          BASE="https://esignet-vs.mosip.testnet.verana.network/v1/esignet"
          CJ=$(mktemp)
          XSRF=$(curl -sf -c "$CJ" "$BASE/csrf/token" | jq -r .token)
          check () {
            NOW=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
            RESP=$(curl -sf -b "$CJ" -H "X-XSRF-TOKEN: $XSRF" -X POST "$BASE/authorization/v2/oauth-details" \
              -H 'Content-Type: application/json' \
              -d "{\"requestTime\":\"$NOW\",\"request\":{\"clientId\":\"$1\",\"scope\":\"resident_id_vc_ldp\",\"responseType\":\"code\",\"redirectUri\":\"$2\",\"display\":\"page\",\"prompt\":\"consent\",\"acrValues\":\"mosip:idp:acr:generated-code\",\"nonce\":\"smoke\",\"state\":\"smoke\"}}")
            echo "$1 -> $(echo "$RESP" | jq -c '{errors}')"
            echo "$RESP" | jq -e '(.errors // []) | length == 0' >/dev/null
          }
          check "wallet-demo" "http://localhost:3004/redirect"
          check "mosip-playground" "https://playground.mosip.testnet.verana.network/api/issue/callback"

      - name: Debug on failure
        if: failure()
        env:
          NS_SECRET: ${{ secrets.K8S_NAMESPACE }}
        run: |
          NS="${NS_SECRET:-mosip}"
          echo "::group::pods"; kubectl get pods -n "$NS" -l 'app in (esignet,postgres-esignet,redis-esignet,mock-identity-system,esignet-ui)' -o wide; echo "::endgroup::"
          for app in esignet mock-identity-system postgres-esignet esignet-ui; do
            echo "::group::logs $app"
            kubectl logs -n "$NS" -l app=$app --tail=120 2>&1 | tail -100 || true
            echo "::endgroup::"
          done

      - name: Summary
        if: always()
        run: |
          {
            echo "## eSignet VS"
            echo ""
            echo "- **eSignet:** https://esignet-vs.mosip.testnet.verana.network/v1/esignet"
            echo "- **OIDC UI:** https://esignet-ui-vs.mosip.testnet.verana.network"
            echo "- **JWKS:** https://esignet-vs.mosip.testnet.verana.network/v1/esignet/oauth/.well-known/jwks.json"
          } >> "$GITHUB_STEP_SUMMARY"
