name: 12_ Deploy Playground (MOSIP showcase)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'playground/**'
      - '.github/workflows/12_deploy-playground.yml'

jobs:
  deploy:
    name: Build and deploy the MOSIP × Verana showcase playground
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_HUB_LOGIN }}
          password: ${{ secrets.DOCKER_HUB_PWD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # The trust story is queried browser-side, but live issuance runs server-side and
      # needs the OIDC client key + a public origin; both are injected at deploy (below).
      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./playground
          push: true
          tags: |
            veranalabs/mosip-playground:${{ github.sha }}
            veranalabs/mosip-playground:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.OVH_KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          printf '%s' "$KUBECONFIG_DATA" > ~/.kube/config

      - name: Install kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4
        with:
          version: 'v1.29.9'

      # The private JWK is the OIDC client's signing key — keep it in a k8s Secret and
      # reference it by secretKeyRef below, never inline it in the manifest or logs.
      - name: Create playground OIDC secret
        env:
          NS_SECRET: ${{ secrets.K8S_NAMESPACE }}
          JWK: ${{ secrets.PLAYGROUND_OIDC_PRIVATE_JWK }}
        run: |
          NS="${NS_SECRET:-mosip}"
          if [ -z "$JWK" ]; then
            echo "::error::PLAYGROUND_OIDC_PRIVATE_JWK secret is empty — set it in Actions secrets" >&2
            exit 1
          fi
          kubectl create secret generic playground-oidc -n "$NS" \
            --from-literal=PLAYGROUND_OIDC_PRIVATE_JWK="$JWK" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy
        env:
          NS_SECRET: ${{ secrets.K8S_NAMESPACE }}
        run: |
          NAMESPACE="${NS_SECRET:-mosip}"
          APP_NAME="playground"
          IMAGE="veranalabs/mosip-playground:${{ github.sha }}"
          HOST="playground.mosip.testnet.verana.network"
          PORT=3000

          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${APP_NAME}
            namespace: ${NAMESPACE}
            labels:
              app: ${APP_NAME}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${APP_NAME}
            template:
              metadata:
                labels:
                  app: ${APP_NAME}
                annotations:
                  deploy-timestamp: "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              spec:
                containers:
                  - name: playground
                    image: ${IMAGE}
                    imagePullPolicy: Always
                    ports:
                      - containerPort: ${PORT}
                    env:
                      - name: PLAYGROUND_OIDC_CLIENT_ID
                        value: "mosip-playground"
                      - name: PLAYGROUND_PUBLIC_ORIGIN
                        value: "https://${HOST}"
                      - name: PLAYGROUND_OIDC_PRIVATE_JWK
                        valueFrom:
                          secretKeyRef:
                            name: playground-oidc
                            key: PLAYGROUND_OIDC_PRIVATE_JWK
                    readinessProbe:
                      httpGet:
                        path: /
                        port: ${PORT}
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    resources:
                      requests:
                        cpu: 50m
                        memory: 128Mi
                      limits:
                        cpu: 500m
                        memory: 256Mi
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${APP_NAME}
            namespace: ${NAMESPACE}
          spec:
            selector:
              app: ${APP_NAME}
            ports:
              - port: ${PORT}
                targetPort: ${PORT}
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ${APP_NAME}
            namespace: ${NAMESPACE}
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              nginx.ingress.kubernetes.io/enable-cors: "true"
          spec:
            ingressClassName: nginx
            tls:
              - hosts:
                  - ${HOST}
                secretName: ${APP_NAME}-tls
            rules:
              - host: ${HOST}
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: ${APP_NAME}
                          port:
                            number: ${PORT}
          EOF

          kubectl rollout status deployment/"${APP_NAME}" -n "$NAMESPACE" --timeout=300s

      - name: Summary
        if: always()
        run: |
          echo "## MOSIP × Verana Playground" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** https://playground.mosip.testnet.verana.network" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** veranalabs/mosip-playground:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
