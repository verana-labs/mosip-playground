name: 7_ Deploy Inji Certify VS (real issuer)

on:
  workflow_dispatch:
  push:
    branches:
      - vs/testnet-mosip
    paths:
      - 'inji-certify-vs/**'
      - '.github/workflows/7_deploy-inji-certify-vs.yml'

jobs:
  deploy-inji-certify-vs:
    name: Deploy real MOSIP Inji Certify + Verana did:web identity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.OVH_KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          printf '%s' "$KUBECONFIG_DATA" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create ConfigMaps (certify config, db init, did:web files)
        env:
          NS_SECRET: ${{ secrets.K8S_NAMESPACE }}
        run: |
          NS="${NS_SECRET:-mosip}"
          # Inji Certify config: MOSIP's base properties + our resident-id profile + the resident CSV
          kubectl create configmap inji-certify-config -n "$NS" \
            --from-file=certify-default.properties=inji-certify-vs/certify/config/certify-default.properties \
            --from-file=certify-residentid.properties=inji-certify-vs/certify/config/certify-residentid.properties \
            --from-file=resident_identity_data.csv=inji-certify-vs/certify/data/resident_identity_data.csv \
            --dry-run=client -o yaml | kubectl apply -f -
          # postgres init (MOSIP schema + our Foundational Resident ID credential_config)
          kubectl create configmap inji-certify-initdb -n "$NS" \
            --from-file=certify_init.sql=inji-certify-vs/certify/db/certify_init.sql \
            --dry-run=client -o yaml | kubectl apply -f -
          # the Verana-facing did:web document + ECS-SERVICE linked-VP
          kubectl create configmap inji-certify-vs-files -n "$NS" \
            --from-file=did.json=inji-certify-vs/public/did.json \
            --from-file=service-vp.json=inji-certify-vs/public/service-vp.json \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy
        env:
          NS_SECRET: ${{ secrets.K8S_NAMESPACE }}
        run: |
          NS="${NS_SECRET:-mosip}"
          kubectl apply -n "$NS" -f inji-certify-vs/manifest.yaml
          # restart so config/DB changes are picked up
          kubectl rollout restart deployment/inji-certify-did deployment/inji-certify -n "$NS" 2>/dev/null || true
          kubectl rollout status deployment/postgres-certify -n "$NS" --timeout=180s
          kubectl rollout status deployment/inji-certify-did -n "$NS" --timeout=180s
          kubectl rollout status deployment/inji-certify -n "$NS" --timeout=600s
          echo "Inji Certify: https://inji-certify-vs.mosip.testnet.verana.network/v1/certify"

      - name: Summary
        if: always()
        run: |
          echo "## Inji Certify (real issuer)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** injistack/inji-certify-with-plugins:0.14.0 (official) + postgres" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Issuance:** https://inji-certify-vs.mosip.testnet.verana.network/v1/certify (Pre-Authorized Code, DataProvider)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **did:web identity:** /.well-known/did.json (Verana ECS-SERVICE linked-VP + Certify signing key)" >> "$GITHUB_STEP_SUMMARY"
