name: 7_ Deploy Inji Certify VS (real issuer)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'inji-certify-vs/**'
      - '.github/workflows/7_deploy-inji-certify-vs.yml'

jobs:
  deploy-inji-certify-vs:
    name: Deploy real MOSIP Inji Certify + Verana did:web identity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.OVH_KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          printf '%s' "$KUBECONFIG_DATA" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create ConfigMaps (certify config, db init, did:web files)
        env:
          NS_SECRET: ${{ secrets.K8S_NAMESPACE }}
        run: |
          NS="${NS_SECRET:-mosip}"
          # Inji Certify config: MOSIP's base properties + our resident-id profile + the resident CSV
          kubectl create configmap inji-certify-config -n "$NS" \
            --from-file=certify-default.properties=inji-certify-vs/certify/config/certify-default.properties \
            --from-file=certify-residentid.properties=inji-certify-vs/certify/config/certify-residentid.properties \
            --from-file=resident_identity_data.csv=inji-certify-vs/certify/registry/resident_identity_data.csv \
            --dry-run=client -o yaml | kubectl apply -f -
          # postgres init (MOSIP schema + our Foundational Resident ID credential_config)
          kubectl create configmap inji-certify-initdb -n "$NS" \
            --from-file=certify_init.sql=inji-certify-vs/certify/db/certify_init.sql \
            --dry-run=client -o yaml | kubectl apply -f -
          # the Verana-facing did:web document + ECS-SERVICE linked-VP
          kubectl create configmap inji-certify-vs-files -n "$NS" \
            --from-file=did.json=inji-certify-vs/public/did.json \
            --from-file=service-vp.json=inji-certify-vs/public/service-vp.json \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy
        env:
          NS_SECRET: ${{ secrets.K8S_NAMESPACE }}
        run: |
          NS="${NS_SECRET:-mosip}"
          # delete the deployments first so their RWO PVCs detach (a rolling update would deadlock
          # on multi-attach); the persistent PVCs themselves are kept so the signing key is stable.
          kubectl delete deployment postgres-certify inji-certify -n "$NS" --ignore-not-found --wait=true --timeout=120s || true
          kubectl apply -n "$NS" -f inji-certify-vs/manifest.yaml
          # restart only the nginx did host so an updated did.json ConfigMap is picked up
          kubectl rollout restart deployment/inji-certify-did -n "$NS" 2>/dev/null || true
          kubectl rollout status deployment/postgres-certify -n "$NS" --timeout=180s
          kubectl rollout status deployment/inji-certify-did -n "$NS" --timeout=180s
          kubectl rollout status deployment/inji-certify -n "$NS" --timeout=420s
          # Verana: the FoundationalResidentID credential display must carry a non-null logo, else
          # Inji Web / mimoto rejects the well-known (RESIDENT-APP-041). The postgres PVC is persistent
          # so certify_init.sql will not re-run (and the DB is 'inji_certify', not 'postgres'). Wait for
          # the table, patch idempotently (non-fatal: a fresh DB already has the logo from init.sql), then
          # restart certify (Recreate strategy => no keystore-PVC multi-attach) to refresh its config cache.
          PGPOD=$(kubectl get pods -n "$NS" -l app=postgres-certify -o jsonpath='{.items[0].metadata.name}')
          for i in $(seq 1 24); do
            kubectl exec -n "$NS" "$PGPOD" -- psql -U postgres -d inji_certify -tAc "SELECT 1 FROM certify.credential_config LIMIT 1" >/dev/null 2>&1 && break
            echo "waiting for certify.credential_config ($i)"; sleep 5
          done
          kubectl exec -n "$NS" "$PGPOD" -- psql -U postgres -d inji_certify -c "UPDATE certify.credential_config SET display = '[{\"logo\": {\"url\": \"https://raw.githubusercontent.com/verana-labs/mosip-playground/main/inji-web-vs/public/cobrand.png\", \"alt_text\": \"MOSIP x Verana\"}, \"name\": \"Foundational Resident ID\", \"locale\": \"en\", \"background_color\": \"#0b5cab\", \"text_color\": \"#FFFFFF\"}]'::jsonb WHERE credential_config_key_id = 'FoundationalResidentID';" || echo "display UPDATE non-fatal (fresh DB already carries the logo)"
          kubectl rollout restart deployment/inji-certify -n "$NS"
          kubectl rollout status deployment/inji-certify -n "$NS" --timeout=420s
          echo "Inji Certify: https://inji-certify-vs.mosip.testnet.verana.network/v1/certify"

      - name: Debug Certify on failure
        if: failure()
        env:
          NS_SECRET: ${{ secrets.K8S_NAMESPACE }}
        run: |
          NS="${NS_SECRET:-mosip}"
          POD=$(kubectl get pods -n "$NS" -l app=inji-certify -o jsonpath='{.items[0].metadata.name}')
          echo "::group::all pods"; kubectl get pods -n "$NS" -l 'app in (inji-certify,postgres-certify,inji-certify-did)' -o wide; echo "::endgroup::"
          echo "::group::postgres logs"; kubectl logs -n "$NS" -l app=postgres-certify --tail=80 2>&1 | tail -60; echo "::endgroup::"
          echo "::group::pod describe (state + events)"; kubectl describe pod "$POD" -n "$NS" | grep -A60 -iE "State|Events" | tail -50; echo "::endgroup::"
          echo "::group::certify logs (current)"; kubectl logs "$POD" -n "$NS" --tail=400 2>&1 | tail -120; echo "::endgroup::"
          echo "::group::certify logs (previous/crashed container)"; kubectl logs "$POD" -n "$NS" --previous --tail=400 2>&1 | tail -150; echo "::endgroup::"

      - name: Summary
        if: always()
        run: |
          echo "## Inji Certify (real issuer)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** injistack/inji-certify-with-plugins:0.14.0 (official) + postgres" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Issuance:** https://inji-certify-vs.mosip.testnet.verana.network/v1/certify (Pre-Authorized Code, DataProvider)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **did:web identity:** /.well-known/did.json (Verana ECS-SERVICE linked-VP + Certify signing key)" >> "$GITHUB_STEP_SUMMARY"
