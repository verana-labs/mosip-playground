name: 14_ Seed eSignet mock identities (recovery)

# The eSignet postgres is ephemeral, so a restart drops the seeded identities
# (Asha/Ravi) and login fails with "invalid individual id". mock-identity-system has
# no public endpoint, so this reseeds them via kubectl exec — non-destructive, no
# stack reset. Run any time after a wipe (the 11_ deploy also seeds them, but resets
# the whole stack to do it).
on:
  workflow_dispatch:

jobs:
  seed-identities:
    name: Reseed Asha + Ravi into mock-identity-system
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_VERANA_DEV }}
        run: |
          mkdir -p ~/.kube
          printf '%s' "$KUBECONFIG_DATA" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4
        with:
          version: 'v1.29.9'

      - name: Seed identities
        env:
          NS_SECRET: ${{ secrets.K8S_NAMESPACE }}
        run: bash esignet-vs/scripts/seed-identities.sh "${NS_SECRET:-mosip}"
