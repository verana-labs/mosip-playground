name: 15_ Debug kubeconfig (temporary)

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.9'

      - name: Measure secrets (lengths only, no values)
        env:
          KUBECONFIG_DATA: ${{ secrets.OVH_KUBECONFIG }}
          DOCKER_LOGIN: ${{ secrets.DOCKER_HUB_LOGIN }}
          NS_SECRET: ${{ secrets.K8S_NAMESPACE }}
        run: |
          echo "OVH_KUBECONFIG  length: ${#KUBECONFIG_DATA} chars"
          echo "DOCKER_HUB_LOGIN length: ${#DOCKER_LOGIN} chars (control, known-working)"
          echo "K8S_NAMESPACE    length: ${#NS_SECRET} chars"
          mkdir -p ~/.kube
          printf '%s' "$KUBECONFIG_DATA" > ~/.kube/config
          echo "written ~/.kube/config bytes: $(wc -c < ~/.kube/config)"
          echo "--- cluster server URL (endpoint, not a credential) ---"
          kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}' 2>&1 || echo "(parse failed / no cluster)"
          echo ""
          echo "--- can kubectl reach the cluster? ---"
          kubectl cluster-info 2>&1 | head -4 || true
          kubectl auth can-i get pods -n "${NS_SECRET:-mosip}" 2>&1 | head -2 || true
